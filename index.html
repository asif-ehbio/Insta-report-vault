<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EHB | Insta Profile Vault v1.2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #00ffcc; --insta-blue: #0095f6; --ios-red: #ff3b30; }
        body, html { margin: 0; padding: 0; background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; height: 100%; width: 100%; }
        
        /* 🔒 CEO Access */
        #login-box { height: 100vh; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; z-index: 2000; position: fixed; top:0; left:0; }
        .login-input { padding: 15px; background: #111; border: 2px solid #333; color: #fff; border-radius: 10px; margin-bottom: 15px; text-align: center; width: 75%; max-width: 300px; outline: none; }
        .login-btn { padding: 12px 40px; background: var(--accent); border: none; border-radius: 30px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        #main-ui { display: none; width: 100%; flex-direction: column; background: #fff; min-height: 100vh; }
        #capture-area { background: #fff; width: 100%; display: inline-block; padding-bottom: 20px; }
        .editable { outline: none; border-bottom: 1px dashed transparent; }

        /* 🔋 Status Bar matched with 54315.png */
        .status-bar { display: flex; justify-content: space-between; padding: 8px 18px; background: #fff; color: #000; font-size: 14px; font-weight: 700; align-items: center; }
        .sb-right { display: flex; align-items: center; gap: 4px; }
        .bat-pill { background: #e5e5ea; border-radius: 12px; padding: 2px 4px; display: flex; align-items: center; gap: 1px; position: relative; min-width: 38px; height: 16px; overflow: hidden; }
        .bat-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--ios-red); transition: width 0.3s ease; z-index: 1; }
        .bat-text { position: relative; z-index: 2; color: #fff; font-size: 10px; font-weight: 800; }

        .top-nav { display: flex; align-items: center; padding: 10px 18px; gap: 30px; }
        .top-nav b { font-size: 22px; flex-grow: 1; letter-spacing: -0.5px; }

        /* 📸 RESTRUCTURED HEADER */
        .profile-header { padding: 15px 18px 10px 18px; display: flex; align-items: flex-start; gap: 20px; }
        .profile-pic-container { width: 85px; height: 85px; border-radius: 50%; overflow: hidden; background: #f0f2f5; cursor: pointer; flex-shrink: 0; }
        .profile-pic-container img { width: 100%; height: 100%; object-fit: cover; }
        
        /* 🛠️ Right Info Column */
        .right-info { flex-grow: 1; display: flex; flex-direction: column; padding-top: 5px; }
        .display-name { font-weight: 600; font-size: 16px; margin-bottom: 12px; } /* Name now above stats */
        
        .stats-box { display: flex; justify-content: space-between; text-align: center; width: 100%; }
        .stat { display: flex; flex-direction: column; }
        .stat b { font-size: 18px; line-height: 1.2; }
        .stat span { font-size: 13px; color: #262626; }

        .bio-section { padding: 0 18px 15px 18px; margin-top: 5px; }
        .bio-text { font-size: 14.5px; color: #262626; line-height: 1.4; }

        .action-btns { padding: 0 18px; display: flex; gap: 8px; margin-bottom: 20px; }
        .btn-follow { flex-grow: 1; background: var(--insta-blue); color: #fff; border: none; border-radius: 8px; padding: 10px; font-weight: 600; font-size: 14px; }
        .btn-more { background: #efefef; padding: 10px 15px; border: none; border-radius: 8px; }

        .private-box { border-top: 1px solid #efefef; margin-top: 40px; padding: 40px 30px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .lock-icon { width: 90px; height: 90px; border: 2px solid #000; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-bottom: 25px; }
        .lock-icon i { font-size: 45px; }
        .private-title { font-size: 24px; font-weight: 800; margin-bottom: 10px; }
        .private-desc { font-size: 14.5px; color: #737373; line-height: 1.4; }

        .footer-action { padding: 20px; background: #000; width: 100%; box-sizing: border-box; }
        .save-btn { width: 100%; padding: 18px; background: var(--accent); border: none; border-radius: 35px; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="login-box">
        <h2 style="color:var(--accent); margin-bottom:20px; font-family:monospace;">INSTA VAULT v1.2</h2>
        <input type="password" id="pass" class="login-input" placeholder="Enter CEO Password">
        <button onclick="unlock()" class="login-btn">Unlock Vault</button>
    </div>

    <div id="main-ui">
        <div id="capture-area">
            <div class="status-bar">
                <div class="editable" contenteditable="true">8:31</div>
                <div class="sb-right">
                    <i class="fab fa-facebook-messenger" style="font-size: 14px;"></i>
                    <i class="fas fa-signal" style="font-size: 12px;"></i>
                    <span style="font-size: 12px; font-weight: 900;">4G</span>
                    <div class="bat-pill">
                        <div id="fill" class="bat-fill" style="width: 13%;"></div>
                        <span class="bat-text"><span id="perc" class="editable" contenteditable="true" oninput="updBat()">13</span>%</span>
                    </div>
                </div>
            </div>

            <div class="top-nav">
                <i class="fas fa-arrow-left"></i>
                <b class="editable" contenteditable="true">ridhwan_restricted</b>
                <i class="fas fa-ellipsis-v"></i>
            </div>

            <div class="profile-header">
                <div class="profile-pic-container" onclick="document.getElementById('file-input').click()">
                    <img id="preview" src="https://via.placeholder.com/150">
                    <input type="file" id="file-input" style="display: none;" accept="image/*" onchange="loadImg(event)">
                </div>
                <div class="right-info">
                    <div class="display-name editable" contenteditable="true">Ridhwan Mahamud</div>
                    <div class="stats-box">
                        <div class="stat"><b class="editable" contenteditable="true">2</b><span>posts</span></div>
                        <div class="stat"><b class="editable" contenteditable="true">43</b><span>followers</span></div>
                        <div class="stat"><b class="editable" contenteditable="true">91</b><span>following</span></div>
                    </div>
                </div>
            </div>

            <div class="bio-section">
                <div class="bio-text editable" contenteditable="true">☠️Criminal☠️</div>
            </div>

            <div class="action-btns">
                <button class="btn-follow">Follow</button>
                <button class="btn-more"><i class="fas fa-user-plus" style="font-size: 14px;"></i></button>
            </div>

            <div class="private-box">
                <div class="lock-icon"><i class="fas fa-lock"></i></div>
                <div class="private-title">This account is private</div>
                <div class="private-desc">Follow this account to see their photos and videos.</div>
            </div>
        </div>

        <div class="footer-action">
            <button class="save-btn" onclick="save()">📸 SAVE SCREENSHOT (v1.2)</button>
        </div>
    </div>

    <script>
        function unlock() {
            if(document.getElementById('pass').value === "asif2008") {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('main-ui').style.display = 'flex';
            } else { alert("ACCESS DENIED!"); }
        }

        function loadImg(event) {
            const reader = new FileReader();
            reader.onload = function() {
                document.getElementById('preview').src = reader.result;
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function updBat() {
            let val = parseInt(document.getElementById('perc').innerText);
            if(!isNaN(val)) {
                document.getElementById('fill').style.width = val + '%';
                document.getElementById('fill').style.background = '#ff3b30';
            }
        }

        function save() {
            const el = document.getElementById('capture-area');
            html2canvas(el, { scale: 3, useCORS: true, backgroundColor: '#ffffff' }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Insta-Name-Fixed.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EHB | Insta Report Vault</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #00ffcc; --fb-green: #31a24c; --ios-green: #34c759; }
        body, html { margin: 0; padding: 0; background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; height: 100%; width: 100%; overflow: hidden; }
        
        #login-box { height: 100vh; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; z-index: 2000; position: fixed; }
        .login-input { padding: 15px; background: #111; border: 2px solid #333; color: #fff; border-radius: 10px; margin-bottom: 15px; text-align: center; width: 75%; max-width: 300px; outline: none; }
        .login-btn { padding: 12px 40px; background: var(--accent); border: none; border-radius: 30px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        #main-ui { display: none; width: 100%; flex-direction: column; min-height: 100vh; }
        #capture-area { background: #fff; width: 100%; display: inline-block; }
        .editable { outline: none; border-bottom: 1px dashed transparent; }

        /* 🔋 Status Bar */
        .status-bar { display: flex; justify-content: space-between; padding: 12px 30px 5px 30px; background: #fff; color: #000; font-size: 17px; font-weight: 900; align-items: center; letter-spacing: -0.5px; }
        .sb-right { display: flex; align-items: center; gap: 6px; }
        .bat-pill { background: #e5e5ea; border-radius: 12px; padding: 2px 5px; display: flex; align-items: center; gap: 2px; position: relative; min-width: 45px; height: 20px; overflow: hidden; }
        .bat-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--ios-green); transition: width 0.3s ease; z-index: 1; }
        .bat-text-wrap { position: relative; z-index: 2; display: flex; align-items: center; gap: 1px; color: #fff; font-size: 12px; font-weight: 800; }

        .fb-nav { padding: 10px 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .fb-nav b { font-size: 24px; color: #1877f2; }

        .content-body { padding: 40px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .check-circle { width: 70px; height: 70px; border: 4px solid var(--fb-green); border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
        .check-circle i { font-size: 35px; color: var(--fb-green); }

        .image-display { width: 100%; max-width: 320px; min-height: 200px; margin-top: 20px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #f0f2f5; overflow: hidden; }
        #preview { width: 100%; display: none; }
        .upload-text { color: #65676b; font-size: 14px; text-align: center; padding: 10px; }

        .title { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
        .desc { font-size: 15px; color: #65676b; line-height: 1.4; margin-bottom: 25px; }

        .footer-action { padding: 20px; background: #000; width: 100%; box-sizing: border-box; }
        .save-btn { width: 100%; padding: 18px; background: var(--accent); border: none; border-radius: 35px; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="login-box">
        <h2 style="color:var(--accent); margin-bottom:20px; font-family:monospace;">INSTA REPORT VAULT</h2>
        <input type="password" id="pass" class="login-input" placeholder="Enter Password">
        <button onclick="unlock()" class="login-btn">Unlock Vault</button>
    </div>

    <div id="main-ui">
        <div id="capture-area">
            <div class="status-bar">
                <div class="editable" contenteditable="true">11:09</div>
                <div class="sb-right">
                    <div style="font-size: 17px; display: flex; gap: 5px;"><i class="fas fa-signal"></i> <i class="fas fa-wifi"></i></div>
                    <div class="bat-pill">
                        <div id="fill" class="bat-fill" style="width: 32%;"></div>
                        <div class="bat-text-wrap">
                            <span id="perc" class="editable" contenteditable="true" oninput="updBat()">32</span>
                            <i class="fas fa-bolt" style="font-size: 10px;"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="fb-nav">
                <b>facebook</b>
                <i class="fas fa-bars" style="font-size: 20px; color: #65676b;"></i>
            </div>

            <div class="content-body">
                <div class="check-circle"><i class="fas fa-check"></i></div>
                <div class="title editable" contenteditable="true">Thanks for letting us know</div>
                <div class="desc editable" contenteditable="true">We've received your report and will review it soon. Your feedback helps us keep the community safe.</div>

                <div class="image-display" onclick="document.getElementById('file-input').click()">
                    <div id="placeholder" class="upload-text"><i class="fas fa-cloud-upload-alt" style="font-size: 30px; display: block; margin-bottom: 5px;"></i>Click here to choice File</div>
                    <img id="preview" src="">
                    <input type="file" id="file-input" style="display: none;" accept="image/*" onchange="loadImg(event)">
                </div>
            </div>
        </div>

        <div class="footer-action">
            <button class="save-btn" onclick="save()">📸 SAVE SCREENSHOT</button>
        </div>
    </div>

    <script>
        function unlock() {
            if(document.getElementById('pass').value === "asif2008") {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('main-ui').style.display = 'flex';
            } else { alert("ACCESS DENIED!"); }
        }

        function loadImg(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const preview = document.getElementById('preview');
                const placeholder = document.getElementById('placeholder');
                preview.src = reader.result;
                preview.style.display = 'block';
                placeholder.style.display = 'none';
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function updBat() {
            let val = parseInt(document.getElementById('perc').innerText);
            if(!isNaN(val)) {
                document.getElementById('fill').style.width = val + '%';
                document.getElementById('fill').style.background = val < 20 ? '#ff3b30' : '#34c759';
            }
        }

        function save() {
            const el = document.getElementById('capture-area');
            html2canvas(el, { scale: 3, useCORS: true, backgroundColor: '#ffffff' }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Insta-Report-Vault.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
